<svg width="980" height="880" viewBox="0 0 980 880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Home screen mockup">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="820" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB37A"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="1080" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="980" height="880" rx="44" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="190" fill="#F97316" fill-opacity="0.18"/>
  <circle cx="810" cy="220" r="220" fill="#7C3AED" fill-opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="225" y="80" width="530" height="720" rx="58" fill="#0F1930" stroke="rgba(255,255,255,.10)"/>
    <rect x="250" y="110" width="480" height="30" rx="15" fill="rgba(255,255,255,.06)"/>
    <circle cx="490" cy="125" r="3" fill="rgba(234,240,255,.55)"/>

    <g transform="translate(260 160)">
      <text x="0" y="0" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="850">Hi, Traveler</text>
      <text x="0" y="26" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="650">Pick a city and start your trip</text>
    </g>

    <g transform="translate(260 230)">
      <rect x="0" y="0" width="460" height="46" rx="18" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.10)"/>
      <text x="16" y="30" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="700">New York City</text>
      <text x="350" y="30" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="650">Change</text>
    </g>

    <g transform="translate(260 294)">
      <text x="0" y="0" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="850">Quick trip modes</text>
      <g transform="translate(0 14)">
        <rect x="0" y="0" width="140" height="44" rx="18" fill="rgba(249,115,22,.14)" stroke="rgba(249,115,22,.35)"/>
        <text x="16" y="28" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="750">Solo</text>
        <rect x="160" y="0" width="140" height="44" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.10)"/>
        <text x="176" y="28" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="750">Couple</text>
        <rect x="320" y="0" width="140" height="44" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.10)"/>
        <text x="336" y="28" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="750">Family</text>
      </g>
    </g>

    <g transform="translate(260 384)">
      <rect x="0" y="0" width="460" height="122" rx="26" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.09)"/>
      <text x="18" y="36" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="850">Featured destinations</text>
      <g transform="translate(18 52)">
        <rect x="0" y="0" width="132" height="52" rx="20" fill="rgba(255,255,255,.06)"/>
        <text x="14" y="32" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700">Times Square</text>
        <rect x="148" y="0" width="132" height="52" rx="20" fill="rgba(255,255,255,.06)"/>
        <text x="162" y="32" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700">Brooklyn</text>
        <rect x="296" y="0" width="132" height="52" rx="20" fill="rgba(255,255,255,.06)"/>
        <text x="310" y="32" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="700">Central Park</text>
      </g>
    </g>

    <g transform="translate(260 524)">
      <text x="0" y="0" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="850">Best Dudes for you</text>
      <g transform="translate(0 14)">
        <rect x="0" y="0" width="460" height="64" rx="22" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.09)"/>
        <circle cx="34" cy="32" r="18" fill="rgba(249,115,22,.18)" stroke="rgba(249,115,22,.35)"/>
        <text x="64" y="29" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="850">Aarav • 4.9</text>
        <text x="64" y="47" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="650">English • Hindi • Night safe</text>
        <rect x="352" y="18" width="92" height="28" rx="14" fill="url(#accent)"/>
        <text x="373" y="37" fill="#151515" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="850">Book</text>
      </g>
