    <g transform="translate(260 612)">
      <rect x="0" y="0" width="460" height="72" rx="26" fill="rgba(249,115,22,.10)" stroke="rgba(249,115,22,.25)"/>
      <text x="18" y="30" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="850">Wallet (Dude Credits)</text>
      <text x="18" y="52" fill="#B7C3E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="650">$24 credits available</text>
      <rect x="352" y="22" width="92" height="28" rx="14" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"/>
      <text x="372" y="41" fill="#EAF0FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="850">View</text>
    </g>
